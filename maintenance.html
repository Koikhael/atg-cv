<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Under Construction</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b16;
      --surface: #0f172a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-strong: #60a5fa;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 30%),
                  linear-gradient(180deg, #0b1221 0%, #070b16 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 2rem;
    }

    .card {
      width: min(100%, 680px);
      padding: 3rem 2rem;
      border-radius: 32px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: var(--shadow);
      border: 1px solid rgba(148, 163, 184, 0.12);
      backdrop-filter: blur(18px);
    }

    h1 {
      font-size: clamp(2.4rem, 4vw, 3.6rem);
      margin-bottom: 1rem;
      letter-spacing: -0.05em;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
      max-width: 44rem;
      margin: 0 auto 2rem;
    }

    .spinner-ring {
      width: 5rem;
      height: 5rem;
      margin: 0 auto 2rem;
      border: 0.5rem solid rgba(56, 189, 248, 0.18);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .details {
      display: grid;
      gap: 1rem;
      margin-top: 1rem;
    }

    .details span {
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <article class="card">
    <div class="spinner-ring" aria-hidden="true"></div>
    <h1>We’re building something new.</h1>
    <p>The site is currently under construction and will be back soon with a refreshed experience. Thanks for your patience while we make improvements.</p>
    <div class="details">
      <span>Expected return: shortly</span>
      <span>If you need help, contact support or check back in a few minutes.</span>
    </div>
  </article>
</body>
</html>
